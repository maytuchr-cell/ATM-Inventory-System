<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History &amp; Tracking — ATM Inventory</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    /* Filter bar */
    .filter-grid { display:grid; grid-template-columns:1fr 1fr auto; gap:16px; align-items:end; margin-bottom:20px; padding:20px; background:var(--bg-subtle); border-radius:10px; border:1px solid var(--border); }
    .filter-group { display:flex; flex-direction:column; }
    .filter-label { font-size:11px; font-weight:600; color:var(--text-muted); letter-spacing:.5px; text-transform:uppercase; margin-bottom:8px; }
    .filter-input, .filter-select { padding:10px 14px; border:1.5px solid var(--border); border-radius:9px; background:var(--bg-input); color:var(--text-primary); font-family:inherit; font-size:13px; transition:.2s; outline:none; }
    .filter-input:focus, .filter-select:focus { border-color:var(--orange); box-shadow:0 0 0 3px var(--orange-ring); }
    .filter-input::placeholder { color:var(--text-muted); }

    /* Overdue toggle */
    .overdue-toggle { display:flex; align-items:center; gap:10px; padding:10px 16px; background:var(--red-bg,#fef2f2); border:1.5px solid var(--red); border-radius:9px; cursor:pointer; transition:all .2s; white-space:nowrap; user-select:none; }
    .overdue-toggle:hover { background:var(--red); }
    .overdue-toggle:hover .overdue-label,
    .overdue-toggle:hover .overdue-icon { color:#fff; }
    .overdue-label { font-size:13px; font-weight:600; color:var(--red-text,#991b1b); transition:color .2s; }
    .overdue-icon  { font-size:14px; color:var(--red); transition:color .2s; }
    .overdue-toggle input[type="checkbox"] { width:15px; height:15px; cursor:pointer; accent-color:var(--red); }

    /* Result bar */
    .result-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .result-count { font-size:13px; color:var(--text-secondary); }
    .result-count strong { color:var(--text-primary); }

    /* Table */
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; }
    thead th { background:var(--bg-subtle); color:var(--text-muted); font-size:11px; font-weight:600; letter-spacing:.6px; text-transform:uppercase; padding:11px 16px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; }
    tbody td { padding:14px 16px; font-size:14px; color:var(--text-primary); border-bottom:1px solid var(--border); vertical-align:middle; }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr { transition:background .15s; }
    tbody tr:hover { background:var(--bg-subtle); }
    tbody tr.row-overdue { background:var(--red-bg,#fef2f2) !important; }
    tbody tr.row-overdue:hover { background:rgba(239,68,68,.12) !important; }

    /* Chips & badges */
    .id-chip   { font-size:12px; font-weight:600; color:var(--text-muted); background:var(--bg-subtle); padding:3px 8px; border-radius:5px; font-family:monospace; border:1px solid var(--border); }
    .date-chip { font-size:12px; font-weight:500; color:var(--text-secondary); background:var(--bg-subtle); padding:4px 10px; border-radius:6px; border:1px solid var(--border); display:inline-block; }
    .due-chip  { font-size:12px; font-weight:600; color:var(--blue-text,#9a3412); background:var(--blue-bg,#fff7ed); padding:4px 10px; border-radius:6px; display:inline-block; }
    .due-chip.overdue { color:var(--red-text,#991b1b); background:var(--red-bg,#fef2f2); animation:pulse-ring 1.4s ease-in-out infinite; }
    @keyframes pulse-ring { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.35)} 50%{box-shadow:0 0 0 4px rgba(239,68,68,.1)} }
    .sub-text  { font-size:12px; color:var(--text-muted); margin-top:3px; display:block; }
    .fw-600    { font-weight:600; }

    /* Detail button */
    .btn-detail { background:var(--bg-subtle); color:var(--text-secondary); border:1.5px solid var(--border); padding:6px 12px; border-radius:7px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; display:inline-flex; align-items:center; gap:4px; }
    .btn-detail:hover { background:var(--orange-light,#fff7ed); color:var(--orange); border-color:var(--orange); }

    /* Detail modal */
    .detail-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:900; align-items:center; justify-content:center; padding:20px; }
    .detail-overlay.open { display:flex; }
    .detail-modal  { background:var(--bg-card); border-radius:18px; border:1px solid var(--border); width:100%; max-width:580px; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.25); }
    .detail-header { display:flex; align-items:center; justify-content:space-between; padding:20px 24px 16px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg-card); z-index:1; border-radius:18px 18px 0 0; }
    .detail-title  { font-size:16px; font-weight:700; color:var(--text-primary); }
    .detail-close  { background:none; border:none; cursor:pointer; color:var(--text-muted); padding:4px; border-radius:6px; display:flex; align-items:center; }
    .detail-close:hover { color:var(--text-primary); background:var(--bg-subtle); }
    .detail-body   { padding:24px; }
    .detail-section { margin-bottom:20px; }
    .detail-section-title { font-size:10px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--orange); margin-bottom:12px; }
    .detail-grid   { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .detail-field label { font-size:11px; font-weight:600; color:var(--text-muted); letter-spacing:.4px; text-transform:uppercase; display:block; margin-bottom:3px; }
    .detail-field.full  { grid-column:1/-1; }
    .detail-value-box   { background:var(--bg-subtle); border:1px solid var(--border); border-radius:8px; padding:10px 14px; font-size:14px; color:var(--text-primary); font-weight:500; }
    .detail-desc   { font-size:14px; color:var(--text-primary); line-height:1.6; background:var(--bg-subtle); border-radius:8px; padding:12px; border:1px solid var(--border); white-space:pre-wrap; }
    .detail-img    { width:100%; border-radius:10px; border:1px solid var(--border); margin-top:4px; object-fit:contain; max-height:300px; cursor:zoom-in; }
    .detail-divider { border:none; border-top:1px solid var(--border); margin:16px 0; }
    .detail-empty  { color:var(--text-muted); font-style:italic; font-size:13px; }

    @media(max-width:768px) { .filter-grid { grid-template-columns:1fr; } .detail-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-root"></div>
  <div class="main-content">

    <div class="topbar">
      <div>
        <div class="topbar-title" data-i18n="hist.title">History &amp; Tracking</div>
        <div class="topbar-sub"   data-i18n="hist.sub">Search and filter all ticket records</div>
      </div>
    </div>

    <div class="page-body">
      <div class="card">
        <div class="card-body">

          <div class="filter-grid">
            <div class="filter-group">
              <span class="filter-label" data-i18n="hist.slabel">Search Technician</span>
              <input type="text" id="searchInput" class="filter-input"
                     data-i18n-placeholder="hist.sph"
                     placeholder="Name, department, phone, or TK-xxxx…"
                     oninput="applyFilters()">
            </div>
            <div class="filter-group">
              <span class="filter-label" data-i18n="hist.flabel">Filter by Part</span>
              <select id="partFilter" class="filter-select" onchange="applyFilters()">
                <option value="all" data-i18n="hist.fall">— All Parts —</option>
              </select>
            </div>
            <label class="overdue-toggle" id="overdueLabel">
              <input type="checkbox" id="overdueFilter" onchange="applyFilters()">
              <span class="overdue-icon">🚩</span>
              <span class="overdue-label" data-i18n="hist.overdue">Overdue Returns Only</span>
            </label>
          </div>

          <div class="result-bar">
            <span class="result-count">
              <span data-i18n="hist.showing">Showing</span>
              <strong id="result-count">—</strong>
              <span data-i18n="hist.records">records</span>
            </span>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width:7%"  data-i18n="hist.colticket">Ticket</th>
                  <th style="width:16%" data-i18n="hist.coltech">Technician</th>
                  <th style="width:12%" data-i18n="hist.coldept">Department</th>
                  <th style="width:15%" data-i18n="hist.colpart">Part Issued</th>
                  <th style="width:10%" data-i18n="hist.coldate">Request Date</th>
                  <th style="width:14%" data-i18n="hist.colstatus">Status</th>
                  <th style="width:14%" data-i18n="hist.coldue">Return Deadline</th>
                  <th style="width:12%" data-i18n="hist.coldetail">Detail</th>
                </tr>
              </thead>
              <tbody id="historyTableBody">
                <tr><td colspan="8" class="empty-state"><span data-i18n="connecting">Connecting to server…</span></td></tr>
              </tbody>
            </table>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-modal">
    <div class="detail-header">
      <span class="detail-title" id="detailTitle">Ticket Detail</span>
      <button class="detail-close" onclick="closeDetailModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<script src="shared/translations.js"></script>
<script src="shared/toast.js"></script>
<script src="shared/api.js"></script>
<script src="shared/layout.js"></script>
<script>
  const IMG_BASE = API_BASE.replace(/\/api$/, '');
  let allTickets = [], allParts = [];

  window.addEventListener('DOMContentLoaded', () => {
    initLayout();
    fetchPartsForDropdown();
    fetchHistory();
  });

  async function fetchPartsForDropdown() {
    try {
      allParts = await api.parts.getAll({ isActive: true });
      const sel = document.getElementById('partFilter');
      allParts.forEach(p => {
        sel.innerHTML += `<option value="${p.partNo}">${p.partName}</option>`;
      });
    } catch (e) { console.error(e); }
  }

  async function fetchHistory() {
    try {
      const tickets = await api.tickets.getAll();
      allTickets = tickets.filter(tk => tk.status !== 'Pending');
      renderTable(allTickets);
    } catch {
      document.getElementById('historyTableBody').innerHTML =
        `<tr><td colspan="8" class="empty-state" style="color:var(--red)">${t('error.connect')}</td></tr>`;
    }
  }

  function renderTable(data) {
    const tbody = document.getElementById('historyTableBody');
    document.getElementById('result-count').textContent = data.length;
    tbody.innerHTML = '';

    if (!data.length) {
      tbody.innerHTML = `<tr><td colspan="8" class="empty-state"><div style="font-size:28px;margin-bottom:8px">🗂</div>${t('hist.noresults')}</td></tr>`;
      return;
    }

    const now    = new Date();
    const locale = getLang() === 'th' ? 'th-TH' : 'en-GB';

    data.forEach(tk => {
      const isOverdue = tk.status === 'Received' && tk.dueDate && now > new Date(tk.dueDate);
      const reqDate   = tk.createdAt  ? new Date(tk.createdAt).toLocaleDateString(locale)  : '—';
      const recDate   = tk.receivedAt ? new Date(tk.receivedAt).toLocaleDateString(locale)  : null;
      const partText  = tk.approvedPartNav?.partName || tk.approvedPartNo
                      || tk.requestedPartNav?.partName || tk.requestedPartNo || '—';
      const phone     = tk.techPhone || '—';

      let statusCell = '';
      if (tk.status === 'Approved') {
        statusCell = `<span class="badge badge-approved"><span class="badge-dot"></span>${t('hist.awaiting')}</span>`;
      } else if (tk.status === 'Rejected') {
        statusCell = `<span class="badge badge-danger"><span class="badge-dot"></span>${t('hist.rejected')}</span>`;
      } else if (tk.status === 'Received') {
        statusCell = isOverdue
          ? `<span class="badge badge-danger"><span class="badge-dot"></span>${t('status.overdue')}</span>`
          : `<span class="badge badge-success"><span class="badge-dot"></span>${t('status.received')}</span>`;
        if (recDate) statusCell += `<span class="sub-text">${t('hist.on')} ${recDate}</span>`;
      }

      let dueCell = `<span style="color:var(--text-muted)">—</span>`;
      if (tk.dueDate) {
        const fmt = new Date(tk.dueDate).toLocaleDateString(locale);
        dueCell = isOverdue
          ? `<span class="due-chip overdue">⚠ ${fmt}</span>`
          : `<span class="due-chip">${fmt}</span>`;
      }

      tbody.innerHTML += `
        <tr class="${isOverdue ? 'row-overdue' : ''}">
          <td><span class="id-chip">${isOverdue ? '⚠ ' : ''}TK-${tk.ticketId.toString().padStart(4,'0')}</span></td>
          <td><span class="fw-600">${tk.techName}</span><span class="sub-text">📞 ${phone}</span></td>
          <td style="color:var(--text-secondary);font-size:13px">${tk.techDept || '—'}</td>
          <td class="fw-600">${partText}</td>
          <td><span class="date-chip">${reqDate}</span></td>
          <td>${statusCell}</td>
          <td>${dueCell}</td>
          <td><button class="btn-detail" onclick="showDetail(${tk.ticketId})">🔍 ${t('detail.btn')}</button></td>
        </tr>`;
    });
  }

  /* ── Detail Modal ── */
  function showDetail(id) {
    const tk = allTickets.find(t => t.ticketId === id);
    if (!tk) return;

    const locale = getLang() === 'th' ? 'th-TH' : 'en-GB';
    const fmt    = d => d ? new Date(d).toLocaleString(locale) : '—';
    const naHtml = `<div class="detail-value-box" style="color:var(--text-muted);font-style:italic;">${t('detail.not.specified')}</div>`;

    const reqName      = tk.requestedPartNav?.partName || tk.requestedPartNo || '—';
    const approvedName = tk.approvedPartNav?.partName  || tk.approvedPartNo  || '—';
    const imgHtml = tk.attachmentPath
      ? `<img src="${IMG_BASE}${tk.attachmentPath}" class="detail-img" alt="Attachment"
              onclick="window.open('${IMG_BASE}${tk.attachmentPath}','_blank')">`
      : `<div style="padding:20px;text-align:center;background:var(--bg-subtle);border-radius:8px;color:var(--text-muted);font-size:13px;">${t('detail.no.image')}</div>`;

    const isOverdue = tk.status === 'Received' && tk.dueDate && new Date() > new Date(tk.dueDate);
    const statusBadge = isOverdue
      ? `<span class="badge badge-danger"><span class="badge-dot"></span>${t('status.overdue')}</span>`
      : tk.status === 'Received' ? `<span class="badge badge-success"><span class="badge-dot"></span>${t('status.received')}</span>`
      : tk.status === 'Approved' ? `<span class="badge badge-approved"><span class="badge-dot"></span>${t('status.awaiting')}</span>`
      : tk.status === 'Rejected' ? `<span class="badge badge-danger"><span class="badge-dot"></span>${t('status.rejected')}</span>`
      : `<span>${tk.status}</span>`;

    document.getElementById('detailTitle').textContent =
      `TK-${id.toString().padStart(4,'0')} — ${tk.techName}`;

    document.getElementById('detailBody').innerHTML = `
      <div class="detail-section">
        <div class="detail-section-title">${t('detail.tech')}</div>
        <div class="detail-grid">
          <div class="detail-field"><label>${t('detail.name')}</label><div class="detail-value-box">${tk.techName || '—'}</div></div>
          <div class="detail-field"><label>${t('detail.dept')}</label><div class="detail-value-box">${tk.techDept || '—'}</div></div>
          <div class="detail-field"><label>${t('detail.phone')}</label><div class="detail-value-box">${tk.techPhone || '—'}</div></div>
          <div class="detail-field"><label>${t('detail.date')}</label><div class="detail-value-box">${fmt(tk.createdAt)}</div></div>
        </div>
      </div>
      <hr class="detail-divider">
      <div class="detail-section">
        <div class="detail-section-title">${t('detail.parts')}</div>
        <div class="detail-grid">
          <div class="detail-field"><label>${t('detail.requested')}</label><div class="detail-value-box">${reqName}</div></div>
          <div class="detail-field"><label>${t('detail.approved')}</label><div class="detail-value-box">${approvedName}</div></div>
          <div class="detail-field"><label>${t('detail.status')}</label><div style="margin-top:2px">${statusBadge}</div></div>
          <div class="detail-field"><label>${t('detail.received.date')}</label><div class="detail-value-box">${fmt(tk.receivedAt)}</div></div>
          <div class="detail-field full"><label>${t('detail.due')}</label>
            <div class="detail-value-box" style="${isOverdue ? 'color:var(--red);border-color:var(--red);background:var(--red-bg);' : ''}">
              ${tk.dueDate ? `${fmt(tk.dueDate)} ${isOverdue ? t('detail.overdue') : ''}` : '—'}
            </div>
          </div>
        </div>
      </div>
      <hr class="detail-divider">
      <div class="detail-section">
        <div class="detail-section-title">${t('detail.faulty')}</div>
        <div class="detail-grid">
          <div class="detail-field"><label>${t('detail.sn')}</label>${tk.faultySerialNo ? `<div class="detail-value-box">${tk.faultySerialNo}</div>` : naHtml}</div>
          <div class="detail-field"><label>${t('detail.partno')}</label>${tk.faultyPartNo ? `<div class="detail-value-box">${tk.faultyPartNo}</div>` : naHtml}</div>
          <div class="detail-field full"><label>${t('detail.model')}</label>${tk.machineModel ? `<div class="detail-value-box">${tk.machineModel}</div>` : naHtml}</div>
          <div class="detail-field full"><label>${t('detail.desc')}</label>${tk.description ? `<div class="detail-desc">${tk.description}</div>` : naHtml}</div>
        </div>
      </div>
      <hr class="detail-divider">
      <div class="detail-section">
        <div class="detail-section-title">${t('detail.attachment')}</div>
        ${imgHtml}
      </div>`;

    document.getElementById('detailOverlay').classList.add('open');
  }

  function closeDetailModal() { document.getElementById('detailOverlay').classList.remove('open'); }
  function closeDetail(e) { if (e.target === document.getElementById('detailOverlay')) closeDetailModal(); }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetailModal(); });

  function applyFilters() {
    const search  = document.getElementById('searchInput').value.toLowerCase();
    const partNo  = document.getElementById('partFilter').value;
    const overdue = document.getElementById('overdueFilter').checked;
    const now     = new Date();

    const filtered = allTickets.filter(tk => {
      const name  = (tk.techName  || '').toLowerCase();
      const phone = (tk.techPhone || '').toLowerCase();
      const dept  = (tk.techDept  || '').toLowerCase();
      const tkId  = 'tk-' + tk.ticketId.toString().padStart(4,'0');

      const matchSearch  = !search || name.includes(search) || phone.includes(search) || dept.includes(search) || tkId.includes(search);
      const tkPartNo     = tk.approvedPartNo || tk.requestedPartNo;
      const matchPart    = partNo === 'all' || tkPartNo === partNo;
      const matchOverdue = !overdue || (tk.status === 'Received' && tk.dueDate && now > new Date(tk.dueDate));

      return matchSearch && matchPart && matchOverdue;
    });

    renderTable(filtered);
  }
</script>
</body>
</html>

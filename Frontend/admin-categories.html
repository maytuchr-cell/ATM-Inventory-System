<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories — ATM Inventory</title>
  <link rel="stylesheet" href="shared/styles.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-root"></div>
    <div class="main-content">
      <div class="topbar">
        <div>
          <div class="topbar-title" data-i18n="cat.title">Categories</div>
          <div class="topbar-sub"   data-i18n="cat.sub">Organize parts by category</div>
        </div>
        <div class="topbar-controls">
          <button class="btn btn-primary" onclick="openModal()">
            <span>+</span> <span data-i18n="cat.add">Add Category</span>
          </button>
        </div>
      </div>

      <div class="page-body">
        <div class="card">
          <div class="tbl-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th data-i18n="cat.col.name">Category Name</th>
                  <th data-i18n="cat.col.desc">Description</th>
                  <th data-i18n="cat.col.parts">Parts Count</th>
                  <th data-i18n="col.status">Status</th>
                  <th data-i18n="col.actions">Actions</th>
                </tr>
              </thead>
              <tbody id="cat-tbody">
                <tr><td colspan="6" class="empty-state" data-i18n="connecting">Connecting…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" style="max-width:420px;">
      <div class="modal-header">
        <div class="modal-title" id="modal-title" data-i18n="cat.add">Add Category</div>
        <button class="btn btn-secondary btn-sm" onclick="closeModal()">✕</button>
      </div>
      <form id="cat-form" onsubmit="saveCategory(event)">
        <div class="form-group">
          <label class="form-label" data-i18n="cat.lbl.name">Category Name</label>
          <input class="form-input" id="f-name" required data-i18n-ph="cat.ph.name">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="cat.lbl.desc">Description</label>
          <input class="form-input" id="f-desc" data-i18n-ph="cat.ph.desc">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal()" data-i18n="btn.cancel">Cancel</button>
          <button type="submit" class="btn btn-primary" data-i18n="btn.save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="shared/translations.js"></script>
  <script src="shared/toast.js"></script>
  <script src="shared/api.js"></script>
  <script src="shared/layout.js"></script>
  <script src="admin-categories.js"></script>
</body>
</html>
